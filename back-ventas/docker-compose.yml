services:
  mysql_db:
    image: mysql:8
    container_name: mysql_db_ventas
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ventasdb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_ventas:/var/lib/mysql

  back_ventas:
    build: .
    container_name: back_ventas
    restart: always
    depends_on:
      - mysql_db
    ports:
      - "8080:8080"
    environment:
      DB_ENDPOINT: mysql_db
      DB_PORT: 3306
      DB_NAME: ventasdb
      DB_USERNAME: root
      DB_PASSWORD: root

volumes:
  mysql_data_ventas: