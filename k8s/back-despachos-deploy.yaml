apiVersion: apps/v1
kind: Deployment
metadata:
  name: back-despachos
  namespace: default
  labels:
    app: back-despachos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: back-despachos
  template:
    metadata:
      labels:
        app: back-despachos
    spec:
      containers:
      - name: back-despachos
        # ID de cuenta de AWS
        image: 767397950209.dkr.ecr.us-east-1.amazonaws.com/back-despachos:latest
        ports:
        - containerPort: 3001
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: back-despachos-service
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 3001
    targetPort: 3001
  selector:
    app: back-despachos