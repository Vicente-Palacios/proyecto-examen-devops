apiVersion: apps/v1
kind: Deployment
metadata:
  name: back-despachos
  namespace: default
  labels:
    app: back-despachos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: back-despachos
  template:
    metadata:
      labels:
        app: back-despachos
    spec:
      containers:
      - name: back-despachos
        # ID de cuenta de AWS
        image: 767397950209.dkr.ecr.us-east-1.amazonaws.com/back-despachos:latest
        ports:
        - containerPort: 3001
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        env:
        - name: DB_HOST
          value: "mysql-service" # <--- Kubernetes enrutará el tráfico automáticamente aquí
        - name: DB_PORT
          value: "3306"
        - name: DB_NAME
          value: "tu_base_datos"
        - name: DB_USER
          value: "root"
        - name: DB_PASSWORD
          value: "root"
---
apiVersion: v1
kind: Service
metadata:
  name: back-despachos-service
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 3001
    targetPort: 3001
  selector:
    app: back-despachos